spring.application.name=bitcoin-api

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/bitcoindb?characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:secret}

spring.cloud.stream.kafka.binder.brokers=${KAFKA_HOST:localhost}:${KAFKA_PORT:29092}
spring.cloud.stream.bindings.prices-out-0.destination=com.ivanfranchin.bitcoin.api.price

springdoc.swagger-ui.disable-swagger-default-url=true

price.scheduler.cron=*/2 * * * * *
